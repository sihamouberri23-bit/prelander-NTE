<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NTE | Neverness to Everness</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=4">
</head>
<body>
  <main class="prelander">
    <div class="background"></div>
    <div class="overlay"></div>

    <header class="topbar" aria-label="NTE header">
      <img class="logo header-logo" src="logos/logo%20(1).png" alt="Neverness to Everness">
      <span class="platform">Windows PC Edition</span>
    </header>

    <section class="hero" aria-label="Neverness to Everness prelander">
      <div class="hero-copy">
        <p class="eyebrow">Official PC Launch</p>
        <h1>Your city just turned supernatural</h1>
        <p class="description">
          Drive into Hethereau and chase the anomalies hiding after midnight.
        </p>
        <div class="actions">
          <a class="cta" href="https://nte.perfectworld.com/en/main.html" target="_blank" rel="noopener">
            Enter the Night
            <span aria-hidden="true">&rarr;</span>
          </a>
          <span class="note">Optimized landing experience for Windows players</span>
        </div>
      </div>

      <div class="video-card" aria-label="Gameplay trailer">
        <video src="videos/video-neverness-to-everness.mp4" autoplay muted loop playsinline poster="images/image-neverness-to-everness.jpeg"></video>
      </div>
    </section>
  </main>

  <script src="main.js"></script>
</body>
</html>
